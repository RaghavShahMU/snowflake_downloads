# Semantic model: super_agent_run
# Last updated: 2025-03-10
# Source: data/super_agent_run.csv
# Grain: one row per agent run (triggered execution)
# Join to super_agents: AGENT_ID -> super_agents.AGENT_ID

name: super_agent_run
description: All triggered (executed) agent runs; one agent can have multiple runs. Join to super_agents on AGENT_ID.
source:
  type: csv
  path: data/super_agent_run.csv
  grain:
    - RUN_ID
  joins:
    - model: super_agents
      on: AGENT_ID

dimensions:
  # Identifiers
  - name: run_id
    source: RUN_ID
    type: string
    description: Unique run ID (primary key).
  - name: agent_id
    source: AGENT_ID
    type: string
    description: Agent that was run (FK to super_agents.AGENT_ID).
  - name: agent_user_id
    source: AGENT_USER_ID
    type: integer
    description: User-scoped agent identifier.
  - name: workspace_id
    source: WORKSPACE_ID
    type: integer
    description: Workspace.
  - name: run_by_user_id
    source: RUN_BY_USER_ID
    type: integer
    description: User who triggered the run.
  - name: run_number
    source: RUN_NUMBER
    type: integer
    description: Run sequence number (e.g. per agent).

  # Entitlement & usage
  - name: entitlement_name
    source: ENTITLEMENT_NAME
    type: string
    description: e.g. super_agent_usages, custom_ai_agent_usages.
  - name: use_type
    source: USE_TYPE
    type: string
    description: How the run was used (e.g. automatic).
  - name: has_ai_addon
    source: HAS_AI_ADDON
    type: string
    description: Whether AI addon is present.
  - name: ai_addon
    source: AI_ADDON
    type: string
    description: AI addon detail.
  - name: subscribed_to_ai_credits
    source: SUBSCRIBED_TO_AI_CREDITS
    type: string
    description: Subscribed to AI credits flag.

  # Timing
  - name: run_started_at
    source: RUN_STARTED_AT
    type: timestamp
    description: When the run started.
  - name: last_call_started_at
    source: LAST_CALL_STARTED_AT
    type: string
    description: When the last call started (cast to timestamp if needed).
  - name: run_duration_ms
    source: RUN_DURATION_MS
    type: string
    description: Run duration in ms (cast to numeric for analysis).

  # Agent & trigger context
  - name: agent_version
    source: AGENT_VERSION
    type: string
    description: Agent version (e.g. v1.0).
  - name: agent_model
    source: AGENT_MODEL
    type: string
    description: Model used (e.g. GPT variant).
  - name: template_type
    source: TEMPLATE_TYPE
    type: string
    description: Template type (e.g. custom).
  - name: trigger_source
    source: TRIGGER_SOURCE
    type: string
    description: What triggered the run (automation, scheduled, dm, introduction, etc.).
  - name: event_surface
    source: EVENT_SURFACE
    type: string
    description: Event surface (e.g. worker).
  - name: trigger_surface_type
    source: TRIGGER_SURFACE_TYPE
    type: string
    description: Trigger surface type.
  - name: trigger_surface_subtype
    source: TRIGGER_SURFACE_SUBTYPE
    type: string
    description: Trigger surface subtype.
  - name: automation_id
    source: AUTOMATION_ID
    type: string
    description: Automation that triggered (when applicable).

  # Tool & LLM usage
  - name: is_missing_tool_call_and_external_call_details
    source: IS_MISSING_TOOL_CALL_AND_EXTERNAL_CALL_DETAILS
    type: string
    description: Flag when details are missing.
  - name: has_ai_uses_consumed
    source: HAS_AI_USES_CONSUMED
    type: boolean
    description: Whether AI uses were consumed.
  - name: ai_actions_consumed
    source: AI_ACTIONS_CONSUMED
    type: integer
    description: Number of AI actions consumed.
  - name: custom_fields_generated_from_ai_count
    source: CUSTOM_FIELDS_GENERATED_FROM_AI_COUNT
    type: integer
    description: Custom fields generated by AI.
  - name: task_properties_generated_from_ai_count
    source: TASK_PROPERTIES_GENERATED_FROM_AI_COUNT
    type: integer
    description: Task properties generated by AI.
  - name: total_llm_call_count
    source: TOTAL_LLM_CALL_COUNT
    type: integer
    description: Total LLM calls.
  - name: external_llm_call_count
    source: EXTERNAL_LLM_CALL_COUNT
    type: string
    description: External LLM call count (cast if needed).
  - name: clickup_tool_external_llm_call_count
    source: CLICKUP_TOOL_EXTERNAL_LLM_CALL_COUNT
    type: string
    description: ClickUp tool external LLM calls.
  - name: clickup_tool_call_count
    source: CLICKUP_TOOL_CALL_COUNT
    type: integer
    description: ClickUp tool calls.
  - name: total_failed_clickup_tool_call_count
    source: TOTAL_FAILED_CLICKUP_TOOL_CALL_COUNT
    type: string
    description: Failed tool calls (cast if needed).
  - name: ignored_llm_call_count
    source: IGNORED_LLM_CALL_COUNT
    type: string
    description: Ignored LLM calls.

  # Cost & credits (stored as VARCHAR in CSV; cast to numeric for measures)
  - name: total_external_llm_call_cost
    source: TOTAL_EXTERNAL_LLM_CALL_COST
    type: string
    description: Total external LLM cost (cast to decimal for analysis).
  - name: external_llm_call_cost
    source: EXTERNAL_LLM_CALL_COST
    type: string
  - name: clickup_tool_external_llm_call_cost
    source: CLICKUP_TOOL_EXTERNAL_LLM_CALL_COST
    type: string
  - name: free_intro_discounted_cost
    source: FREE_INTRO_DISCOUNTED_COST
    type: string
  - name: initial_run_discounted_cost
    source: INITIAL_RUN_DISCOUNTED_COST
    type: string
  - name: other_allocated_cost
    source: OTHER_ALLOCATED_COST
    type: string
  - name: ignored_cost
    source: IGNORED_COST
    type: string
  - name: customer_billed_cost
    source: CUSTOMER_BILLED_COST
    type: string
    description: Customer billed cost (cast to decimal for analysis).
  - name: credits
    source: CREDITS
    type: string
  - name: params_used_credits_per_dollar
    source: PARAMS_USED_CREDITS_PER_DOLLAR
    type: string
  - name: params_used_max
    source: PARAMS_USED_MAX
    type: string
  - name: params_used_min
    source: PARAMS_USED_MIN
    type: string
  - name: params_used_multiplier
    source: PARAMS_USED_MULTIPLIER
    type: string
  - name: params_max_impact
    source: PARAMS_MAX_IMPACT
    type: string
  - name: params_min_impact
    source: PARAMS_MIN_IMPACT
    type: string
  - name: params_num_runs_with_initial_discount
    source: PARAMS_NUM_RUNS_WITH_INITIAL_DISCOUNT
    type: string
  - name: params_initial_runs_discount_rate
    source: PARAMS_INITIAL_RUNS_DISCOUNT_RATE
    type: string
  - name: params_used_openai_discount_default_tier
    source: PARAMS_USED_OPENAI_DISCOUNT_DEFAULT_TIER
    type: string
  - name: params_used_openai_discount_priority_tier
    source: PARAMS_USED_OPENAI_DISCOUNT_PRIORITY_TIER
    type: string

measures:
  - name: run_count
    type: count
    description: Number of agent runs.
    dimension: run_id
  - name: distinct_agent_count
    type: count_distinct
    dimension: agent_id
    description: Number of distinct agents that had at least one run.
  - name: total_llm_calls
    type: sum
    source: TOTAL_LLM_CALL_COUNT
    description: Sum of LLM calls across all runs.
  - name: total_clickup_tool_calls
    type: sum
    source: CLICKUP_TOOL_CALL_COUNT
    description: Sum of ClickUp tool calls across all runs.
  - name: avg_llm_calls_per_run
    type: avg
    source: TOTAL_LLM_CALL_COUNT
    description: Average LLM calls per run.
  - name: total_ai_actions_consumed
    type: sum
    source: AI_ACTIONS_CONSUMED
    description: Sum of AI actions consumed across all runs.
  - name: runs_with_ai_consumed
    type: count
    description: Number of runs where AI uses were consumed.
    filter: has_ai_uses_consumed = true
